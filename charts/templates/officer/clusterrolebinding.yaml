apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: officer
  labels:
    app.kubernetes.io/name: court
    app.kubernetes.io/component: officer
    {{- include "court.labels" . | nindent 4 }}

roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: officer

subjects:
  - kind: ServiceAccount
    name: officer
    namespace: {{ .Release.Namespace }}

# Binds the officer ServiceAccount to the ClusterRole,
# granting cluster-wide permissions required to watch Pods across namespaces.
