apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: officer
  labels:
    app.kubernetes.io/name: court
    app.kubernetes.io/component: officer
    {{- include "court.labels" . | nindent 4 }}

rules:
  # Core Kubernetes resources used by the controller
  - apiGroups: [""]
    resources:
      - pods        # Watch and reconcile pods
      - pods/log    # read pod logs (incidentReport enrichment)
      - events      # emit and read events
      - configmaps  # internal controller-runtime usage
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch

  # Leader election (controller-runtime requirement)
  - apiGroups: ["coordination.k8s.io"]
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      