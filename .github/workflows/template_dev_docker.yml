name: Template Dev Docker Push

on:
  workflow_call:
    inputs:
      component:
        required: true
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  image_build-and-deploy:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      - name: Set build date
        run: echo "BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.26
          cache: true
          cache-dependency-path: go.sum
          
      - name: Build Go binary
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            export GOARCH=amd64
          else
            export GOARCH=arm64
          fi

          export GOOS=linux

          make build-${{ inputs.component }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: image=moby/buildkit:latest
          buildkitd-flags: --allow-insecure-entitlement network.host

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}-${{ inputs.component }}
          tags: |
            type=raw,value=dev
          labels: |
            org.opencontainers.image.title=${{ github.repository }}-${{ inputs.component }}
            org.opencontainers.image.description=An image with ${{ github.repository }}-${{ inputs.component }} binary installed
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.vendor=Pedro Cozinheiro
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMPONENT=${{ inputs.component }}
            VERSION=development
            BUILD_DATE=${{ env.BUILD_DATE }}
            GIT_COMMIT=${{ github.sha }}
            GOARCH=${{ matrix.arch }}
            GOOS=linux