syntax = "proto3";

package archive.v1;

option go_package = "github.com/ghdrope/court/proto/archive;archivepb";

// ArchiveService is responsible for persisting incident reports
service ArchiveService {

  // StoreIncident persists a full incident report in the archive storage.
  // It is typically called by upstream services after receiving an incident.
  rpc StoreIncident(StoreIncidentRequest) returns (StoreIncidentResponse);
}

// StoreIncidentRequest contains a full incident report payload.
message StoreIncidentRequest {
  string id = 1;
  string pod_name = 2;
  string namespace = 3;
  string phase = 4;
  string reason = 5;

  // container_issues lists detected runtime issues for containers in the Pod.
  repeated ContainerIssue container_issues = 6;

  // logs contains a limited snapshot of relevant Pod logs.
  repeated string logs = 7;
}

// ContainerIssue represents container-level failure details.
message ContainerIssue {
  string container = 1;
  string reason = 2;
}

// StoreIncidentReport represents the result of a StoreIncident operation.
// It indicates whether the incident was successfully persisted.
message StoreIncidentResponse {
  bool success = 1;
}
